<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NavHub</title>
    <meta
      name="description"
      content="NavHub — 自托管的个人导航与工作台，聚合书签、搜索与小组件。"
    />
    <meta name="theme-color" content="#0f1626" />

    <!-- Favicons: keep the existing raster favicon, add the scalable SVG. -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" href="/navigation.png" />

    <!-- PWA: installable web app -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="NavHub" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="NavHub" />
    <meta
      property="og:description"
      content="NavHub — 自托管的个人导航与工作台，聚合书签、搜索与小组件。"
    />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="NavHub" />
    <meta
      name="twitter:description"
      content="NavHub — 自托管的个人导航与工作台，聚合书签、搜索与小组件。"
    />
  </head>
  <body>
    <!--
      Wallpaper preload hint: kick off the image fetch in parallel with the
      JS bundle download. On a slow network this can shave seconds off the
      first paint of the wallpaper. Reads the same localStorage keys the
      runtime writes; if anything is missing or malformed we silently bail.
    -->
    <script>
      (function () {
        try {
          var seen = {};
          var isTemporaryUrl = function (href) {
            if (!href || typeof href !== "string") return false;
            try {
              var params = new URL(href, location.origin).searchParams;
              var temporary = false;
              params.forEach(function (_value, key) {
                var normalized = key.toLowerCase();
                if (
                  normalized === "x-amz-signature" ||
                  normalized === "x-amz-credential" ||
                  normalized === "x-amz-date" ||
                  normalized === "x-amz-expires" ||
                  normalized === "awsaccesskeyid"
                ) {
                  temporary = true;
                }
              });
              return temporary;
            } catch (_e) {
              return false;
            }
          };
          var addPreload = function (href, priority) {
            if (
              !href ||
              typeof href !== "string" ||
              isTemporaryUrl(href) ||
              seen[href]
            )
              return false;
            seen[href] = true;
            var l = document.createElement("link");
            l.rel = "preload";
            l.as = "image";
            l.href = href;
            l.fetchPriority = priority || "auto";
            document.head.appendChild(l);
            return true;
          };

          // Work out the active mode before preloading. Older versions always
          // preferred a stale shuffle snapshot, even after the user pinned a
          // different wallpaper.
          var tweaks = {};
          var authenticated = false;
          var swrRaw = localStorage.getItem("navhub_swr_v1");
          if (swrRaw) {
            var swr = JSON.parse(swrRaw);
            authenticated = !!(swr && swr.status && swr.status.authenticated);
            tweaks =
              swr &&
              swr.workspace &&
              swr.workspace.preferences &&
              swr.workspace.preferences.tweaks;
            tweaks = tweaks || {};
          }
          if (!authenticated) {
            var guestRaw = localStorage.getItem("navhub_guest_tweaks");
            if (guestRaw) {
              tweaks = Object.assign({}, tweaks, JSON.parse(guestRaw));
            }
          }

          var shuffleEnabled =
            tweaks.wallpaperShuffle !== false &&
            tweaks.backgroundMode !== "theme";
          if (shuffleEnabled) {
            var shuffleRaw = localStorage.getItem("navhub_last_wallpaper");
            if (shuffleRaw) {
              var preset = JSON.parse(shuffleRaw);
              if (preset && preset.mediaType !== "video") {
                addPreload(preset.posterUrl || preset.thumbUrl, "high");
                // The full image must not compete with its visible thumbnail.
                addPreload(preset.assetUrl, "auto");
                return;
              }
            }
          }

          if (
            tweaks.backgroundMode === "wallpaper" &&
            tweaks.wallpaperMediaType !== "video"
          ) {
            addPreload(tweaks.wallpaperPosterUrl, "high");
            addPreload(tweaks.wallpaperUrl, "auto");
          }
        } catch (_e) {
          /* ignore — preload is purely a perf hint */
        }
      })();
    </script>

    <div id="root"></div>

    <!-- Background SVG registry (inline gradients, no hand-drawn artwork) -->
    <svg width="0" height="0" style="position: absolute">
      <defs>
        <linearGradient id="bg-dawn" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#f8c48b" />
          <stop offset="0.35" stop-color="#d89a7a" />
          <stop offset="0.65" stop-color="#6e7f7a" />
          <stop offset="1" stop-color="#384a4a" />
        </linearGradient>
        <linearGradient id="bg-ocean" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#1a2a4a" />
          <stop offset="0.5" stop-color="#2d5a7a" />
          <stop offset="1" stop-color="#0f1a2e" />
        </linearGradient>
        <linearGradient id="bg-mist" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#e8dcc8" />
          <stop offset="0.5" stop-color="#c8b8a0" />
          <stop offset="1" stop-color="#5a5248" />
        </linearGradient>
        <linearGradient id="bg-night" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#1e1b3a" />
          <stop offset="0.5" stop-color="#4a2c5e" />
          <stop offset="1" stop-color="#0a0818" />
        </linearGradient>
      </defs>
    </svg>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
