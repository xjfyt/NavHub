<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NavHub</title>
    <link rel="icon" type="image/png" href="/navigation.png" />
  </head>
  <body>
    <!--
      Wallpaper preload hint: kick off the image fetch in parallel with the
      JS bundle download. On a slow network this can shave seconds off the
      first paint of the wallpaper. Reads the same localStorage keys the
      runtime writes; if anything is missing or malformed we silently bail.
    -->
    <script>
      (function () {
        try {
          var addPreload = function (href) {
            if (!href || typeof href !== "string") return;
            var l = document.createElement("link");
            l.rel = "preload";
            l.as = "image";
            l.href = href;
            l.fetchPriority = "high";
            document.head.appendChild(l);
          };
          // Shuffle mode: useWallpaperShuffle caches the last preset here.
          var shuffleRaw = localStorage.getItem("navhub_last_wallpaper");
          if (shuffleRaw) {
            var preset = JSON.parse(shuffleRaw);
            if (preset && preset.mediaType !== "video") {
              addPreload(preset.assetUrl);
              return;
            }
          }
          // Pinned mode: read from the SWR snapshot of /workspace.
          var swrRaw = localStorage.getItem("navhub_swr_v1");
          if (swrRaw) {
            var swr = JSON.parse(swrRaw);
            var tweaks =
              swr && swr.workspace && swr.workspace.preferences && swr.workspace.preferences.tweaks;
            if (
              tweaks &&
              tweaks.backgroundMode === "wallpaper" &&
              tweaks.wallpaperMediaType !== "video"
            ) {
              addPreload(tweaks.wallpaperUrl);
            }
          }
        } catch (_e) {
          /* ignore — preload is purely a perf hint */
        }
      })();
    </script>

    <div id="root"></div>

    <!-- Background SVG registry (inline gradients, no hand-drawn artwork) -->
    <svg width="0" height="0" style="position: absolute">
      <defs>
        <linearGradient id="bg-dawn" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#f8c48b" />
          <stop offset="0.35" stop-color="#d89a7a" />
          <stop offset="0.65" stop-color="#6e7f7a" />
          <stop offset="1" stop-color="#384a4a" />
        </linearGradient>
        <linearGradient id="bg-ocean" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#1a2a4a" />
          <stop offset="0.5" stop-color="#2d5a7a" />
          <stop offset="1" stop-color="#0f1a2e" />
        </linearGradient>
        <linearGradient id="bg-mist" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#e8dcc8" />
          <stop offset="0.5" stop-color="#c8b8a0" />
          <stop offset="1" stop-color="#5a5248" />
        </linearGradient>
        <linearGradient id="bg-night" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#1e1b3a" />
          <stop offset="0.5" stop-color="#4a2c5e" />
          <stop offset="1" stop-color="#0a0818" />
        </linearGradient>
      </defs>
    </svg>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
