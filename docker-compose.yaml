# `version` is intentionally omitted — Compose v2 ignores it and emits a warning.

services:
  navhub:
    build: .
    restart: unless-stopped
    ports:
      # 容器内应用监听 8088(见 config 的 [server].port);两侧须一致,否则访问不到。
      - "8088:8088"
    environment:
      # NEVER ship a default password in a public manifest. Set these via a local
      # `.env` next to this file, or in your orchestrator's secret store. The
      # build will refuse to come up if any of them are empty.
      - NAVHUB__DATABASE__HOST=postgres
      - NAVHUB__DATABASE__USER=${PG_USER:?PG_USER must be set}
      - NAVHUB__DATABASE__PASSWORD=${PG_PASSWORD:?PG_PASSWORD must be set}
      - NAVHUB__DATABASE__DATABASE=${PG_DATABASE:?PG_DATABASE must be set}
      - NAVHUB__REDIS__HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${PG_USER:?PG_USER must be set}
      - POSTGRES_PASSWORD=${PG_PASSWORD:?PG_PASSWORD must be set}
      - POSTGRES_DB=${PG_DATABASE:?PG_DATABASE must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${PG_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
