version: '3.8'

services:
  navhub:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NAVHUB__DATABASE__HOST=postgres
      - NAVHUB__DATABASE__USER=navhub
      - NAVHUB__DATABASE__PASSWORD=navhub_secret
      - NAVHUB__DATABASE__DATABASE=navhub
      - NAVHUB__REDIS__HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=navhub
      - POSTGRES_PASSWORD=navhub_secret
      - POSTGRES_DB=navhub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U navhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
