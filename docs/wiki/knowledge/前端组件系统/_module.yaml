# 前端组件系统模块配置

module:
  name: "前端组件系统"
  description: "NavHub的React前端架构和UI组件"
  version: "1.0.0"
  maintainer: "NavHub Team"

components:
  - name: "React架构"
    description: "应用入口、状态管理、路由"
    files:
      - "frontend/src/main.tsx"
      - "frontend/src/App.tsx"
      - "frontend/src/api.ts"
      - "frontend/src/types.ts"

  - name: "页面组件"
    description: "主要页面组件"
    files:
      - "frontend/src/LoginScreen.tsx"
      - "frontend/src/WorkspaceScreen.tsx"
      - "frontend/src/ChangePasswordScreen.tsx"

  - name: "Shell组件"
    description: "外壳和布局组件"
    files:
      - "frontend/src/components/Shell.tsx"
      - "frontend/src/components/Sidebar.tsx"
      - "frontend/src/components/NavView.tsx"
      - "frontend/src/components/SearchBar.tsx"

  - name: "图标组件"
    description: "图标和磁贴组件"
    files:
      - "frontend/src/components/Icon.tsx"
      - "frontend/src/components/IconTile.tsx"
      - "frontend/src/components/FolderOverlay.tsx"

  - name: "拖拽系统"
    description: "基于dnd-kit的拖拽功能"
    files:
      - "frontend/src/components/"
    dependency: "@dnd-kit"

  - name: "小组件"
    description: "可配置的小组件系统"
    files:
      - "frontend/src/widgets/"

  - name: "样式系统"
    description: "CSS样式和设计Token"
    files:
      - "frontend/src/styles.css"
      - "frontend/src/shell.css"

  - name: "工具函数"
    description: "通用工具函数"
    files:
      - "frontend/src/utils/"

  - name: "国际化"
    description: "i18n多语言支持"
    files:
      - "frontend/src/i18n/"

tech_stack:
  - "React 18"
  - "TypeScript 5"
  - "Vite 5"
  - "@dnd-kit (拖拽)"
  - "Tailwind CSS"
  - "sonner (Toast)"

build_commands:
  dev: "cd frontend && npm run dev"
  build: "cd frontend && npm run build"
  lint: "cd frontend && npm run lint"
