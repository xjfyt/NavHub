name: Build and Push Docker Images

# OPS-7 供应链加固:第三方 Action 建议固定到 commit SHA(防 tag 被重打)。
# 首方 actions/* 维持 @v4 大版本即可。对安全敏感的第三方 Action(docker/*、
# aquasecurity/trivy-action、anchore/sbom-action、github/codeql-action)推荐改为:
#   uses: docker/build-push-action@<40 位 commit SHA>  # v6
# 获取 SHA:在该 Action 仓库对应 release tag 上 `git rev-parse <tag>`,或用
# pinact/ratchet 等工具批量固定。此处保留版本标签 + 注释,SHA 由维护者按需补全
# (离线环境无法解析真实 SHA,不臆造)。

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Trivy 把扫描结果以 SARIF 上传到 GitHub 代码扫描需要此权限。
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up QEMU (multi-arch)
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push all-in-one image
      id: build
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64
        tags: |
          ghcr.io/${{ github.repository_owner }}/navhub:${{ github.event.release.tag_name }}
          ghcr.io/${{ github.repository_owner }}/navhub:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        # build-push-action 原生生成并随镜像推送 SBOM 与 provenance 证明。
        sbom: true
        provenance: mode=max

    # 用 syft 额外导出一份 SPDX SBOM 工件,便于离线留存 / 合规审计。
    - name: Generate SBOM (SPDX JSON) artifact
      uses: anchore/sbom-action@v0
      with:
        image: ghcr.io/${{ github.repository_owner }}/navhub@${{ steps.build.outputs.digest }}
        format: spdx-json
        output-file: navhub-sbom.spdx.json

    - name: Upload SBOM artifact
      uses: actions/upload-artifact@v4
      with:
        name: navhub-sbom
        path: navhub-sbom.spdx.json

    # Trivy 镜像漏洞扫描。按摘要扫描刚推送的镜像;结果上传到代码扫描。
    # 不阻断发布(continue-on-error),仅作可见性与告警。
    - name: Trivy image vulnerability scan
      uses: aquasecurity/trivy-action@0.28.0
      continue-on-error: true
      with:
        image-ref: ghcr.io/${{ github.repository_owner }}/navhub@${{ steps.build.outputs.digest }}
        format: sarif
        output: trivy-results.sarif
        severity: CRITICAL,HIGH
        ignore-unfixed: true

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      continue-on-error: true
      with:
        sarif_file: trivy-results.sarif

