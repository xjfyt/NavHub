name: Build and Push Docker Images

# 仅使用 docker/* 官方 Action(@v3/@v6 稳定大版本)与 actions/checkout@v6,避免第三方
# 复合 Action 的传递性 tag 被回收导致整作业在 setup 阶段就无法解析(曾因
# aquasecurity/trivy-action 传递依赖 setup-trivy@v0.2.1 被删而反复失败)。
# 镜像的 SBOM 与 provenance 证明由 build-push-action 原生生成并随镜像推送(无需额外 Action)。
# 如需重新引入 Trivy 漏洞扫描 / 独立 SBOM 工件,请固定到经验证存在的版本或 commit SHA 后再加回。

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up QEMU (multi-arch)
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push all-in-one image
      id: build
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64
        tags: |
          ghcr.io/${{ github.repository_owner }}/navhub:${{ github.event.release.tag_name }}
          ghcr.io/${{ github.repository_owner }}/navhub:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        # 原生生成并随镜像推送 SBOM 与 provenance 证明。
        sbom: true
        provenance: mode=max
