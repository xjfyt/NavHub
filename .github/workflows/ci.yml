name: CI

on:
  push:
  pull_request:

# 同一分支/PR 的新推送取消仍在运行的旧任务,节省 CI 资源。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (fmt / clippy / test / audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all --check

      # Cargo.toml 的 [lints] 表已把 clippy::all 设为 warn;-D warnings 升级为错误。
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      # 测试为纯单元测试,运行时不连接数据库,无需 Postgres service。
      - name: Test
        run: cargo test --all-targets

  backend-audit:
    name: Backend cargo-audit (advisory)
    runs-on: ubuntu-latest
    # 安全公告噪声较大且常受上游依赖牵制,不阻断主流程,仅作可见性提示。
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        working-directory: backend
        # 显式忽略「受传递性依赖牵制、暂无上游修复」的公告(unmaintained/unsound/
        # 非运行时路径),保持该 advisory 任务为绿;新公告仍会浮现且本任务
        # continue-on-error 不阻断主流程。来源:scraper→selectors→fxhash、
        # aws-sdk-s3→lru、sqlx-mysql→rsa(本项目用 Postgres,不走 mysql/rsa 路径)。
        run: >-
          cargo audit
          --ignore RUSTSEC-2023-0071
          --ignore RUSTSEC-2025-0057
          --ignore RUSTSEC-2026-0002
          --ignore RUSTSEC-2026-0098
          --ignore RUSTSEC-2026-0099
          --ignore RUSTSEC-2026-0104

  frontend:
    name: Frontend (eslint / prettier / typecheck / test / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # 锁文件在 Windows 生成,沿用它会触发 npm 跨平台 optionalDependencies 安装缺陷
        # (npm/cli#4828),漏装 Linux 的 esbuild/rollup 原生二进制 → vitest 启动报错 / build 失败。
        # 故删除锁文件后 npm install,按本平台全新解析安装正确原生包(npm 官方规避方式)。
        run: rm -f package-lock.json && npm install --no-audit --no-fund

      - name: ESLint
        run: npm run lint:eslint

      - name: Prettier check
        run: npm run format:check

      - name: Typecheck
        run: npx tsc -b --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
