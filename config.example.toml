# NavHub 主配置文件
# 首次启动会读取本文件；运行时超级管理员可在后台覆盖部分项（SSO、system）
# 覆盖值存入 app_settings 表，优先级高于本文件

[server]
host = "0.0.0.0"
port = 8088
# 生产环境反代域名，用于 Cookie domain 与 OIDC redirect 推导
public_url = "https://navigation.home.xjfyt.top"

[database]
host = "10.12.31.129"
port = 5433
user = "xjfyt"
password = "w20010129"
database = "navigation"
max_connections = 10

[redis]
host = "10.12.31.129"
port = 6379
password = "w20010129"
db = 3

[superadmin]
# 首次启动（DB 中无 superadmin 角色用户）时自动创建
username = "superadmin"
password = "superadmin"
email = "superadmin@admin.com"
display_name = "Super Admin"
# 是否允许超管用账号密码登录;关闭后 /auth/password 返回 403
# password_login_enabled = true
# 首位完成 SSO 登录的用户自动升级为 superadmin
# first_sso_bind = false
# 是否要求超管在首次登录时强制修改密码。默认 true。
# 关闭此项意味着配置文件中的明文 password 直接生效为永久密码,仅在受控演示环境考虑关闭。
# force_change_password = true

[sso]
# 默认值；超管可在后台修改，修改后以 app_settings.sso 为准
enabled = true
issuer = "https://auth.home.xjfyt.top"
client_id = "f3832b950cff564a42d3"
client_secret = "f05b894b7196fb2230434fc47d48132e54614148"
redirect_uri = "https://navigation.home.xjfyt.top/auth/callback"
scopes = ["openid", "profile", "email"]

[app]
audit_retention_days = 90

session_ttl_days = 7
upload_max_mb = 2
log_level = "info"
# 关闭后端出站 HTTPS 证书校验,仅在调试自签名证书时开启,生产环境严禁开启
# tls_accept_invalid_certs = false


[storage.s3]
endpoint = "https://minio.example.com"
region = "us-east-1"
bucket = "navigation"
access_key = "replace-me"
secret_key = "replace-me"
path_style = true
key_prefix = "assets"
# 24h: 同一个对象 24 小时内拿到的 URL 字节一致，浏览器/反代 HTTP 缓存才能命中，
# 国内访问体验明显改善。文件名是 sha256 内容哈希，URL 泄露不会暴露其他对象。
presign_ttl_secs = 86400

# 可选：和风天气 API（留空则组件返回静态样例）
[weather]
key = ""

[frontend]
# 生产模式下 Rust 托管的前端静态目录
dist_dir = "./frontend/dist"
