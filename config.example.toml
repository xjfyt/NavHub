# NavHub 主配置文件示例
# 复制为 config.toml 并填入真实值;所有项均可用环境变量 NAVHUB__<SECTION>__<KEY> 覆盖。
# 运行时超级管理员可在后台覆盖部分项(SSO、system),覆盖值存入 app_settings 表,优先级高于本文件。
# ⚠️ 切勿在本示例(已纳入 git)中填入真实密钥;真实配置写入 config.toml(已被 .gitignore 忽略)。

[server]
host = "0.0.0.0"
port = 8088
# 生产环境反代域名,用于 Cookie domain 与 OIDC redirect 推导
public_url = "http://localhost:8088"

[database]
host = "127.0.0.1"
port = 5432
user = "navhub"
password = "CHANGE_ME"
database = "navhub"
max_connections = 10

[redis]
host = "127.0.0.1"
port = 6379
# 无密码留空即可
password = ""
db = 0

[superadmin]
# 首次启动(DB 中无 superadmin 角色用户)时自动创建,首次登录强制改密
username = "superadmin"
password = "superadmin"
email = "admin@example.com"
display_name = "Super Admin"
# 是否允许超管用账号密码登录;关闭后 /auth/password 返回 403
# password_login_enabled = true
# 首位完成 SSO 登录的用户自动升级为 superadmin
# first_sso_bind = false
# 是否要求超管在首次登录时强制修改密码。默认 true。
# 关闭此项意味着配置文件中的明文 password 直接生效为永久密码,仅在受控演示环境考虑关闭。
# force_change_password = true

[sso]
# 默认关闭;需要时在此填入或在后台配置(以 app_settings.sso 为准)后开启。
enabled = false
issuer = "https://sso.example.com"
client_id = "CHANGE_ME"
client_secret = "CHANGE_ME"
redirect_uri = "http://localhost:8088/auth/callback"
scopes = ["openid", "profile", "email"]

[app]
audit_retention_days = 90
session_ttl_days = 7
upload_max_mb = 2
log_level = "info"
# 关闭后端出站 HTTPS 证书校验,仅在调试自签名证书时开启,生产环境严禁开启
# tls_accept_invalid_certs = false
# 是否允许 favicon 代理访问私有/内网 IP(SSRF 开关,默认 false;link-local/云元数据始终拒绝)
# favicon_allow_private_targets = false
# 是否在 /readyz 就绪探测中加入一次浅层 S3 可达性检查(HeadBucket)。默认 false:
# 对象存储可能慢/可选,且 readyz 须快速返回。开启后由下方超时兜底,超时或失败均判为未就绪。
# readyz_check_storage = false
# 上面 S3 就绪探测的超时(毫秒)。默认 2000,下限 100。仅在 readyz_check_storage=true 时生效。
# readyz_storage_timeout_ms = 2000

[storage.s3]
endpoint = "https://s3.example.com"
region = "us-east-1"
bucket = "navhub"
access_key = "CHANGE_ME"
secret_key = "CHANGE_ME"
path_style = true
key_prefix = "assets"
# 24h: 同一对象 24 小时内拿到的 URL 字节一致,浏览器/反代 HTTP 缓存才能命中。
# 文件名是 sha256 内容哈希,URL 泄露不会暴露其他对象。
presign_ttl_secs = 86400

# 可选:和风天气 API(留空则组件返回静态样例)
[weather]
key = ""

[frontend]
# 生产模式下 Rust 托管的前端静态目录
dist_dir = "./frontend/dist"
